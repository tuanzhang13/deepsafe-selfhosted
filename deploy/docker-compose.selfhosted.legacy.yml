# DeepSafe 自主部署版 — 兼容 docker-compose 1.x（Ubuntu 16.04 等旧系统）
# 用法: docker-compose -f docker-compose.selfhosted.legacy.yml pull && docker-compose -f docker-compose.selfhosted.legacy.yml up -d
version: '2.1'

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-deepsafe}
      MYSQL_USER: ${MYSQL_USER:-deepsafe}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-deepsafe}
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-bookworm
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  api:
    image: ${DEEPSAFE_IMAGE_PREFIX:-ghcr.io/tuanzhang13}/deepsafe-selfhosted-api:${DEEPSAFE_VERSION:-latest}
    restart: unless-stopped
    env_file:
      - .env.selfhosted
    environment:
      HTTP_ADDR: ":8080"
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      DATABASE_URL: ${MYSQL_USER:-deepsafe}:${MYSQL_PASSWORD:-deepsafe}@tcp(mysql:3306)/${MYSQL_DATABASE:-deepsafe}?charset=utf8mb4&parseTime=True&loc=Local
      REDIS_URL: redis://redis:6379/0
      REDIS_ADDR: redis:6379
      NETVERIFY_EDITION: selfhosted
      EDITION: selfhosted
      LICENSE_PATH: /app/data/license.lic
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      GIN_MODE: release
    volumes:
      - license_data:/app/data
    depends_on:
      - mysql
      - redis
    expose:
      - "8080"

  author:
    image: ${DEEPSAFE_IMAGE_PREFIX:-ghcr.io/tuanzhang13}/deepsafe-selfhosted-author:${DEEPSAFE_VERSION:-latest}
    restart: unless-stopped
    expose:
      - "80"

  web:
    image: ${DEEPSAFE_IMAGE_PREFIX:-ghcr.io/tuanzhang13}/deepsafe-selfhosted-web:${DEEPSAFE_VERSION:-latest}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8088}:80"
    depends_on:
      - api
      - author

volumes:
  mysql_data:
  redis_data:
  license_data:
