services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-deepsafe}
      MYSQL_USER: ${MYSQL_USER:-deepsafe}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-deepsafe}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: "8080"
      DATABASE_URL: ${MYSQL_USER:-deepsafe}:${MYSQL_PASSWORD:-deepsafe}@tcp(mysql:3306)/${MYSQL_DATABASE:-deepsafe}?charset=utf8mb4&parseTime=True&loc=Local
      REDIS_URL: redis://redis:6379/0
      REDIS_ADDR: redis:6379
      NETVERIFY_EDITION: ${EDITION:-saas}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      GIN_MODE: release
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT:-8080}:8080"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    profiles:
      - with-nginx

volumes:
  mysql_data:
  redis_data:
